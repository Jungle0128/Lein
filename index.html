<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>黄莹琳| 作品集/title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .gallery {
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: max-content;
      gap: 0;
      padding: 0;
    }

    .gallery-item {
      width: 100%;
      overflow: hidden;
      background: #0a0a0a;
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* 手机端：单页显示 */
    @media (max-width: 1024px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }

    /* 平板和更小设�?*/
    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="gallery">
