      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

    .gallery {
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: auto;
      gap: 0;
      padding: 0;
    }

    .gallery-item {
      position: relative;
      width: 100%;
      aspect-ratio: auto;
      overflow: hidden;
    }

    .gallery-item img {

      height: 100%;
      object-fit: cover;

    }
